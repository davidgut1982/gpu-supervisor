[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    -ra
    --tb=short
    --strict-markers
    -W ignore::DeprecationWarning
    -p no:cacheprovider
markers =
    asyncio: asyncio tests
    integration: integration tests requiring Docker
    real_network: tests that spin up real subprocess uvicorn servers (slow, skippable in CI)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
