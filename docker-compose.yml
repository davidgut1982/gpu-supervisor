services:
  gpu-supervisor:
    build: .
    image: gpu-supervisor:latest
    container_name: gpu-supervisor

    # CPU-only service: the supervisor never touches the GPU directly.
    cpus: 2.0

    # Memory: in-memory registry + httpx pools fits comfortably in 512 MB.
    mem_limit: 512m

    ports:
      - "8202:8202"

    environment:
      # REQUIRED (single-GPU): set this to your GPU's usable VRAM in GB
      # (e.g. RTX 3060 ~ 11.6). The supervisor refuses to start unless at least
      # one of TOTAL_VRAM_GB / GPU0_VRAM_GB / GPU1_VRAM_GB is > 0.
      # Kept for backward compatibility and as the fallback for device_id="default".
      TOTAL_VRAM_GB: "11.6"
      # Per-device budgets for multi-GPU hosts. Services that register with
      # device_id="0"/"1" are budgeted and evicted against these independently,
      # so a P4 (GPU0) and an RTX 3060 (GPU1) can't evict each other or OOM-conflict.
      GPU0_VRAM_GB: "7.4"
      GPU1_VRAM_GB: "11.6"
      LOG_LEVEL: "INFO"
      # Optional: enable API key auth by setting a non-empty value.
      # API_KEY: "your-secret-key"
      # Tier keep-alives can be overridden per-deployment:
      # TIER2_KEEP_ALIVE_SECONDS: "1800"
      # TIER3_KEEP_ALIVE_SECONDS: "300"

    networks:
      - supervisor_network

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8202/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  supervisor_network:
    driver: bridge
